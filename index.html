<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rainha Restaurante - Desde 1999</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <link href="https://db.onlinewebfonts.com/c/608cc969dd13c92a7296966835c25938?family=Zizo" rel="stylesheet">
</head>
<body>

   <header class="main-header">
    <div class="container header-content">
        <div class="logo-area">
            <img src="assets/img/Logo-Rainha.png" alt="Rainha Restaurante Logo" class="logo">
        </div>

        <div class="cta-area">
            <h1 class="main-title">
                AQUI A TRADIÇÃO <br>
                <span class="subtitle-header">é comer bem!</span>
            </h1>
        </div>
        
        <div class="garfo-area">
            <img src="assets/img/Garfo.png" alt="Garfo com carne" class="floating-fork">
        </div>
    </div>
</header>
<div class="container-oculta-garfo"></div>
<section class="about-section">
    <div class="container about-content">

        <div class="family-card">
            <div class="info-side">
                <h2 class="section-title">ABERTO <br><span class="highlight">TODOS OS DIAS</span></h2>
                <div class="text-content">
                    <p>Aberto todos os dias, o <strong>Rainha Restaurante</strong> une uma gastronomia saudável, receitas tradicionais e o sabor do churrasco em uma experiência pensada para quem valoriza qualidade e bem-estar.</p>
                </div>
                <div class="decor-circles"></div>
            </div>

            <div class="image-side">
                <img src="assets/img/foto-familia.png" alt="Família no Restaurante" class="family-img">
            </div>
        </div>

                 <div class="carousel">
  <div class="group">
    <div class="card"><img src="assets/img/prato-carne-arroz.png" alt="Churrasco"></div>
    <div class="card"><img src="assets/img/prato-frango-arroz.png" alt="Frango"></div>
    <div class="card"><img src="assets/img/prato-salada.png" alt="Salada"></div>
    </div>
  
  <div aria-hidden="true" class="group">
    <div class="card"><img src="assets/img/prato-carne-arroz.png" alt="Churrasco"></div>
    <div class="card"><img src="assets/img/prato-frango-arroz.png" alt="Frango"></div>
    <div class="card"><img src="assets/img/prato-salada.png" alt="Salada"></div>
  </div>
</div>

    </div>
</section>
</body>
</html>
